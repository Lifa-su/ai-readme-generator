<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI README Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--sf:#161b22;--sf2:#21262d;--bd:#30363d;--tx:#e6edf3;--tx2:#8b949e;--ac:#58a6ff;--ac2:#3fb950;--r:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--sf);border-bottom:1px solid var(--bd);padding:16px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:20px}
header span{color:var(--tx2);font-size:14px;margin-left:auto}
.wrap{display:flex;flex:1;overflow:hidden}
.left{width:380px;min-width:300px;border-right:1px solid var(--bd);background:var(--sf);padding:24px;overflow-y:auto}
.right{flex:1;display:flex;flex-direction:column}
label{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input[type=text],textarea,select{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-size:14px;font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ac)}
textarea{resize:vertical;min-height:70px}
.field{margin-bottom:16px}
.cb{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;margin-bottom:8px}
.cb input[type=checkbox]{width:18px;height:18px;accent-color:var(--ac)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tag{padding:4px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s;user-select:none}
.tag.on{background:rgba(88,166,255,.15);border-color:var(--ac);color:var(--ac)}
.tag:hover{border-color:var(--ac)}
.bar{display:flex;gap:8px;padding:10px 24px;background:var(--sf);border-bottom:1px solid var(--bd)}
.bar button{padding:8px 16px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf2);color:var(--tx);font-size:13px;cursor:pointer;font-weight:500}
.bar button:hover{border-color:var(--ac)}
.bar button.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.bar .cp{margin-left:auto;background:var(--ac2);border-color:var(--ac2);color:#fff}
.pv{flex:1;overflow-y:auto;padding:24px;line-height:1.7}
.pv h1{font-size:26px;border-bottom:1px solid var(--bd);padding-bottom:10px;margin:20px 0 14px}
.pv h2{font-size:20px;border-bottom:1px solid var(--bd);padding-bottom:6px;margin:20px 0 10px}
.pv h3{font-size:17px;margin:16px 0 8px}
.pv p{margin:6px 0}
.pv ul,.pv ol{padding-left:24px;margin:6px 0}
.pv li{margin:3px 0}
.pv code{background:var(--sf2);padding:2px 6px;border-radius:4px;font-size:13px;font-family:Consolas,monospace}
.pv pre{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;overflow-x:auto;margin:10px 0}
.pv pre code{background:none;padding:0}
.pv a{color:var(--ac)}
.pv img{max-width:100%}
.pv hr{border:none;border-top:2px solid var(--bd);margin:20px 0}
#src{display:none;white-space:pre-wrap;font-family:Consolas,monospace;font-size:13px;line-height:1.6;color:var(--tx2);padding:24px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ac2);color:#fff;padding:12px 20px;border-radius:var(--r);font-size:14px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:99}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:768px){.wrap{flex-direction:column}.left{width:100%;border-right:none;border-bottom:1px solid var(--bd);max-height:50vh}}
</style>
</head>
<body>
<header>
<h1>&#128221; AI README Generator</h1>
<span>Generate professional README.md instantly</span>
</header>
<div class="wrap">
<div class="left" id="form">
<div class="field"><label>Project Name</label><input type="text" id="pName" placeholder="my-awesome-project"></div>
<div class="field"><label>Description</label><textarea id="pDesc" rows="3" placeholder="A brief description of your project..."></textarea></div>
<div class="field"><label>Tech Stack (click to toggle)</label><div class="tags" id="tags"></div><input type="text" id="addTech" placeholder="Custom tech, press Enter"></div>
<div class="field"><label>Author</label><input type="text" id="pAuthor" placeholder="Your Name"></div>
<div class="field"><label>License</label><select id="pLicense"><option>MIT</option><option>Apache-2.0</option><option>GPL-3.0</option><option>BSD-3-Clause</option><option>ISC</option><option>Unlicense</option></select></div>
<div class="field"><label>Optional Sections</label>
<label class="cb"><input type="checkbox" id="optApi"> Include API Documentation</label>
<label class="cb"><input type="checkbox" id="optContrib" checked> Include Contributing Guide</label>
</div>
</div>
<div class="right">
<div class="bar">
<button class="on" id="btnPv" onclick="showPv()">Preview</button>
<button id="btnSrc" onclick="showSrc()">Markdown</button>
<button class="cp" onclick="copyMd()">&#128203; Copy Markdown</button>
</div>
<div class="pv" id="pvWrap">
<div id="pv"></div>
<div id="src"></div>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const TECHS=['JavaScript','TypeScript','Python','React','Vue','Node.js','Go','Rust','Java','Docker','PostgreSQL','MongoDB','Redis','GraphQL','REST API','AWS','TailwindCSS','Next.js'];
const $=id=>document.getElementById(id);
let selTech=new Set();
let mdCache='';

function initTags(){
  const c=$('tags');
  TECHS.forEach(t=>{
    const d=document.createElement('span');
    d.className='tag';d.textContent=t;
    d.onclick=()=>{d.classList.toggle('on');d.classList.contains('on')?selTech.add(t):selTech.delete(t);gen()};
    c.appendChild(d);
  });
}

$('addTech').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.value.trim()){
    e.preventDefault();const v=e.target.value.trim();
    if(!selTech.has(v)){selTech.add(v);const d=document.createElement('span');d.className='tag on';d.textContent=v;d.onclick=()=>{d.classList.toggle('on');d.classList.contains('on')?selTech.add(v):selTech.delete(v);gen()};$('tags').appendChild(d)}
    e.target.value='';gen();
  }
});

document.querySelectorAll('#form input,#form textarea,#form select').forEach(el=>el.addEventListener('input',gen));
document.querySelectorAll('#form input[type=checkbox]').forEach(el=>el.addEventListener('change',gen));

function gen(){
  const name=$('pName').value.trim()||'my-project';
  const desc=$('pDesc').value.trim()||'An awesome project';
  const author=$('pAuthor').value.trim()||'Author';
  const license=$('pLicense').value;
  const api=$('optApi').checked;
  const contrib=$('optContrib').checked;
  const techs=[...selTech];
  const slug=name.toLowerCase().replace(/\s+/g,'-');

  let md='';
  md+=`<p align="center">\n  <img src="https://via.placeholder.com/200x200.png?text=${encodeURIComponent(name)}" alt="${name} logo" width="200">\n</p>\n\n`;
  md+=`# ${name}\n\n`;
  md+=`![Build Status](https://img.shields.io/badge/build-passing-brightgreen) `;
  md+=`![Version](https://img.shields.io/badge/version-1.0.0-blue) `;
  md+=`![License](https://img.shields.io/badge/license-${license}-green)\n\n`;
  md+=`> ${desc}\n\n`;

  // TOC
  md+=`## Table of Contents\n\n`;
  md+=`- [Features](#features)\n`;
  md+=`- [Tech Stack](#tech-stack)\n`;
  md+=`- [Installation](#installation)\n`;
  md+=`- [Usage](#usage)\n`;
  if(api) md+=`- [API Documentation](#api-documentation)\n`;
  if(contrib) md+=`- [Contributing](#contributing)\n`;
  md+=`- [License](#license)\n\n`;

  md+=`---\n\n`;

  // Features
  md+=`## Features\n\n`;
  md+=`- Feature 1: Describe your first key feature\n`;
  md+=`- Feature 2: Describe your second key feature\n`;
  md+=`- Feature 3: Describe your third key feature\n`;
  md+=`- Feature 4: Describe your fourth key feature\n\n`;

  // Tech Stack
  if(techs.length>0){
    md+=`## Tech Stack\n\n`;
    md+=`| Technology | Purpose |\n|---|---|\n`;
    techs.forEach(t=>md+=`| ${t} | Describe purpose |\n`);
    md+=`\n`;
  }

  // Installation
  md+=`## Installation\n\n`;
  md+=`### Prerequisites\n\n`;
  if(techs.includes('Node.js')||techs.includes('JavaScript')||techs.includes('TypeScript')||techs.includes('React')||techs.includes('Vue')||techs.includes('Next.js'))
    md+=`- Node.js >= 18.0\n- npm or yarn\n\n`;
  else if(techs.includes('Python'))
    md+=`- Python >= 3.9\n- pip\n\n`;
  else if(techs.includes('Go'))
    md+=`- Go >= 1.21\n\n`;
  else if(techs.includes('Rust'))
    md+=`- Rust >= 1.70\n- Cargo\n\n`;
  else if(techs.includes('Java'))
    md+=`- Java >= 17\n- Maven or Gradle\n\n`;
  else
    md+=`- List your prerequisites here\n\n`;

  md+="### Steps\n\n";
  md+="```bash\n";
  md+=`# Clone the repository\ngit clone https://github.com/${author}/${slug}.git\n\n`;
  md+=`# Navigate to the project\ncd ${slug}\n\n`;

  if(techs.includes('Node.js')||techs.includes('React')||techs.includes('Vue')||techs.includes('Next.js')||techs.includes('JavaScript')||techs.includes('TypeScript'))
    md+=`# Install dependencies\nnpm install\n`;
  else if(techs.includes('Python'))
    md+=`# Install dependencies\npip install -r requirements.txt\n`;
  else if(techs.includes('Go'))
    md+=`# Install dependencies\ngo mod download\n`;
  else if(techs.includes('Rust'))
    md+=`# Build the project\ncargo build --release\n`;
  else
    md+=`# Install dependencies\n# Add your install command here\n`;
  md+="```\n\n";

  // Usage
  md+=`## Usage\n\n`;
  md+="```bash\n";
  if(techs.includes('Node.js')||techs.includes('React')||techs.includes('Vue')||techs.includes('Next.js'))
    md+=`npm start\n`;
  else if(techs.includes('Python'))
    md+=`python main.py\n`;
  else if(techs.includes('Go'))
    md+=`go run main.go\n`;
  else if(techs.includes('Rust'))
    md+=`cargo run\n`;
  else
    md+=`# Add your run command here\n`;
  md+="```\n\n";

  // API
  if(api){
    md+=`## API Documentation\n\n`;
    md+=`### Endpoints\n\n`;
    md+=`#### \`GET /api/resource\`\n\n`;
    md+=`Returns a list of resources.\n\n`;
    md+="**Response:**\n\n```json\n{\n  \"status\": \"success\",\n  \"data\": []\n}\n```\n\n";
    md+=`#### \`POST /api/resource\`\n\n`;
    md+=`Creates a new resource.\n\n`;
    md+="**Request Body:**\n\n```json\n{\n  \"name\": \"string\",\n  \"value\": \"string\"\n}\n```\n\n";
  }

  // Contributing
  if(contrib){
    md+=`## Contributing\n\n`;
    md+=`Contributions are welcome! Please follow these steps:\n\n`;
    md+=`1. Fork the repository\n`;
    md+=`2. Create your feature branch (\`git checkout -b feature/amazing-feature\`)\n`;
    md+=`3. Commit your changes (\`git commit -m 'Add amazing feature'\`)\n`;
    md+=`4. Push to the branch (\`git push origin feature/amazing-feature\`)\n`;
    md+=`5. Open a Pull Request\n\n`;
    md+=`Please read [CONTRIBUTING.md](CONTRIBUTING.md) for details on our code of conduct.\n\n`;
  }

  // License
  md+=`## License\n\n`;
  md+=`This project is licensed under the ${license} License - see the [LICENSE](LICENSE) file for details.\n\n`;

  md+=`---\n\n`;
  md+=`<p align="center">Made with ❤️ by <a href="https://github.com/${author}">${author}</a></p>\n`;

  mdCache=md;
  $('pv').innerHTML=renderMd(md);
  $('src').textContent=md;
}

function renderMd(md){
  let h=md;
  // Code blocks first
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(m,lang,code)=>'<pre><code>'+esc(code.trim())+'</code></pre>');
  // Images
  h=h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  // Links
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  // Inline code
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  // Bold
  h=h.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  // Italic
  h=h.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  // H3
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  // H2
  h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  // H1
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // HR
  h=h.replace(/^---$/gm,'<hr>');
  // Blockquote
  h=h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  // Table
  h=h.replace(/(\|.+\|\n)+/g, m=>{
    const rows=m.trim().split('\n').filter(r=>!/^\|[\s-|]+\|$/.test(r));
    if(rows.length===0) return m;
    let t='<table>';
    rows.forEach((r,i)=>{
      const cells=r.split('|').filter(c=>c.trim());
      const tag=i===0?'th':'td';
      t+='<tr>'+cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')+'</tr>';
    });
    return t+'</table>';
  });
  // Unordered list
  h=h.replace(/(^- .+\n?)+/gm, m=>{
    const items=m.trim().split('\n');
    return '<ul>'+items.map(i=>'<li>'+i.replace(/^- /,'')+'</li>').join('')+'</ul>';
  });
  // Ordered list
  h=h.replace(/(^\d+\. .+\n?)+/gm, m=>{
    const items=m.trim().split('\n');
    return '<ol>'+items.map(i=>'<li>'+i.replace(/^\d+\. /,'')+'</li>').join('')+'</ol>';
  });
  // Paragraphs - wrap remaining lines
  h=h.replace(/^(?!<[a-z/])((?!<).+)$/gm,'<p>$1</p>');
  // Centered blocks
  h=h.replace(/&lt;p align=&quot;center&quot;&gt;/g,'<p align="center">');
  h=h.replace(/&lt;\/p&gt;/g,'</p>');
  h=h.replace(/&lt;a href=&quot;([^&]+)&quot;&gt;/g,'<a href="$1">');
  h=h.replace(/&lt;\/a&gt;/g,'</a>');
  return h;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showPv(){$('pv').style.display='';$('src').style.display='none';$('btnPv').classList.add('on');$('btnSrc').classList.remove('on')}
function showSrc(){$('pv').style.display='none';$('src').style.display='block';$('btnPv').classList.remove('on');$('btnSrc').classList.add('on')}

function copyMd(){
  navigator.clipboard.writeText(mdCache).then(()=>{
    const t=$('toast');t.textContent='Copied to clipboard!';t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);
  });
}

function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

initTags();
gen();
</script>
<script src="https://alwingulla.com/88/tag.min.js" data-zone="130747" async data-cfasync="false"></script>
</body>
</html>
